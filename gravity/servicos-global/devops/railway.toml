# Railway — Configuração de Deploy do Gravity
# Cada serviço tem seu próprio service no Railway apontando para seu subdiretório

[build]
builder = "NIXPACKS"

[deploy]
healthcheckPath    = "/health"
healthcheckTimeout = 30
restartPolicyType  = "ON_FAILURE"
restartPolicyMaxRetries = 3

# ─── Serviços de tenant ────────────────────────────────────────────────────────
# Duplicar este bloco por serviço — configure via Railway dashboard:
# Service > Settings > Root Directory = servicos-global/tenant/<nome>

# ─── Variáveis obrigatórias por serviço ───────────────────────────────────────
# DATABASE_URL          → Provided by Railway (PostgreSQL plugin)
# INTERNAL_SERVICE_KEY  → UUID gerado uma vez, compartilhado entre todos os serviços
# PORT                  → Provided by Railway automatically

# ─── Variáveis por ambiente ───────────────────────────────────────────────────
# NODE_ENV=production   → staging | production
# SENTRY_DSN            → DSN do projeto no Sentry (por serviço)
